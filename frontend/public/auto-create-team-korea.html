<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Auto Upload Team Korea Frame</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #fff;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
        }
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .status h2 {
            margin: 0 0 20px 0;
            font-size: 2rem;
        }
        .progress {
            font-size: 1.2rem;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .success {
            color: #22c55e;
            font-size: 3rem;
        }
        .error {
            color: #ef4444;
        }
        canvas {
            border: 3px solid #dc2626;
            border-radius: 10px;
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇰🇷 Team Korea Frame - Auto Upload</h1>
        
        <div class="status">
            <h2 id="statusTitle">🎨 Creating Frame...</h2>
            <div class="progress" id="progress">Initializing...</div>
        </div>

        <canvas id="canvas" width="1080" height="2160" style="display:none"></canvas>
        
        <div id="actions" style="display:none">
            <button onclick="retry()">🔄 Retry Upload</button>
            <button onclick="window.location.href='/admin'">📊 Go to Admin</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001';
        const FRAME_ID = 'frame_1781880861870';
        
        const COLORS = {
            blue: '#0047A0',
            red: '#CD2E3A',
            white: '#FFFFFF',
            black: '#000000',
            gold: '#FFD700',
            darkBlue: '#003478'
        };

        const PLAYERS = [
            { name: 'GYUMIN', emoji: '🦝', color: '#0047A0', y: 220 },      // Moved up
            { name: 'SEONGJANG', emoji: '🔥', color: '#CD2E3A', y: 720 },   // Adjusted
            { name: 'HEAVEN', emoji: '😇', color: '#E0E0E0', y: 1220 },     // Adjusted
            { name: 'HEATHER', emoji: '⭐', color: '#FFD700', y: 1720 }     // Adjusted
        ];

        function updateStatus(title, message) {
            document.getElementById('statusTitle').textContent = title;
            document.getElementById('progress').textContent = message;
        }

        function createGradient(ctx, x0, y0, x1, y1, colors) {
            const gradient = ctx.createLinearGradient(x0, y0, x1, y1);
            colors.forEach((color, i) => {
                gradient.addColorStop(i / (colors.length - 1), color);
            });
            return gradient;
        }

        function drawFrame() {
            updateStatus('🎨 Drawing Frame...', 'Creating canvas elements...');
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // Background
            const bgGrad = createGradient(ctx, 0, 0, canvas.width, canvas.height, 
                ['#FFFFFF', '#F0F4FF', '#FFFFFF', '#FFF0F0', '#FFFFFF']);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Borders
            ctx.strokeStyle = COLORS.blue;
            ctx.lineWidth = 20;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            ctx.strokeStyle = COLORS.red;
            ctx.lineWidth = 10;
            ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);

            // Header
            const headerGrad = createGradient(ctx, 0, 0, canvas.width, 150,
                [COLORS.blue, COLORS.red, COLORS.blue]);
            ctx.fillStyle = headerGrad;
            ctx.fillRect(0, 0, canvas.width, 180);

            // Title
            ctx.font = 'bold 90px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 8;
            ctx.strokeText('TEAM KOREA 🇰🇷', canvas.width / 2, 90);
            ctx.fillStyle = COLORS.white;
            ctx.fillText('TEAM KOREA 🇰🇷', canvas.width / 2, 90);

            // Photo slots - LARGER for better visibility
            const slotWidth = 950;  // Increased from 900
            const slotHeight = 480; // Increased from 450
            const startX = (canvas.width - slotWidth) / 2;
            const nameBarHeight = 50; // Reduced from 60

            PLAYERS.forEach((player, index) => {
                const y = player.y;

                // Slot background
                const slotGrad = createGradient(ctx, startX, y, startX + slotWidth, y + slotHeight,
                    ['rgba(255, 255, 255, 0.9)', 'rgba(200, 200, 200, 0.9)']);
                ctx.fillStyle = slotGrad;
                ctx.fillRect(startX, y, slotWidth, slotHeight);

                // Border - thinner
                ctx.strokeStyle = player.color;
                ctx.lineWidth = 5; // Reduced from 8
                ctx.strokeRect(startX, y, slotWidth, slotHeight);

                // Player label - smaller and at bottom of slot
                ctx.fillStyle = player.color;
                ctx.fillRect(startX, y + slotHeight - nameBarHeight, slotWidth, nameBarHeight);

                // Player name - at bottom
                ctx.font = 'bold 35px Arial'; // Reduced from 40px
                
                // Black outline for all names (visibility)
                ctx.strokeStyle = COLORS.black;
                ctx.lineWidth = 3;
                ctx.strokeText(`${player.emoji} ${player.name}`, startX + slotWidth / 2, y + slotHeight - nameBarHeight/2);
                
                // Use contrasting color for HEAVEN (black text on white bar)
                if (player.name === 'HEAVEN') {
                    ctx.fillStyle = '#1a1a1a'; // Dark text for white background
                } else {
                    ctx.fillStyle = COLORS.white;
                }
                ctx.fillText(`${player.emoji} ${player.name}`, startX + slotWidth / 2, y + slotHeight - nameBarHeight/2);

                // Corners
                const cs = 30;
                ctx.fillStyle = COLORS.gold;
                ctx.fillRect(startX - 5, y - 5, cs, 5);
                ctx.fillRect(startX - 5, y - 5, 5, cs);
                ctx.fillRect(startX + slotWidth - cs + 5, y - 5, cs, 5);
                ctx.fillRect(startX + slotWidth, y - 5, 5, cs);
                ctx.fillRect(startX - 5, y + slotHeight, cs, 5);
                ctx.fillRect(startX - 5, y + slotHeight - cs + 5, 5, cs);
                ctx.fillRect(startX + slotWidth - cs + 5, y + slotHeight, cs, 5);
                ctx.fillRect(startX + slotWidth, y + slotHeight - cs + 5, 5, cs);

                // Slot number
                ctx.font = 'bold 100px Arial';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillText((index + 1).toString(), startX + slotWidth / 2, y + slotHeight / 2);
            });

            // Footer
            const footerGrad = createGradient(ctx, 0, canvas.height - 200, canvas.width, canvas.height,
                [COLORS.red, COLORS.darkBlue, COLORS.red]);
            ctx.fillStyle = footerGrad;
            ctx.fillRect(0, canvas.height - 200, canvas.width, 200);

            // Slogan
            ctx.font = 'bold 70px Arial';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 6;
            ctx.strokeText('RISE AGAIN', canvas.width / 2, canvas.height - 130);
            ctx.fillStyle = COLORS.gold;
            ctx.fillText('RISE AGAIN', canvas.width / 2, canvas.height - 130);

            // Event
            ctx.font = 'bold 50px Arial';
            ctx.fillStyle = COLORS.white;
            ctx.fillText('PNC 2026', canvas.width / 2, canvas.height - 60);

            // Stars
            ctx.font = '30px Arial';
            for (let i = 0; i < 25; i++) {
                const x = 60 + Math.random() * (canvas.width - 120);
                const y = 200 + Math.random() * (canvas.height - 400);
                const stars = ['⭐', '✨', '💫'];
                ctx.fillStyle = `rgba(255, 215, 0, ${0.3 + Math.random() * 0.4})`;
                ctx.fillText(stars[Math.floor(Math.random() * stars.length)], x, y);
            }

            // Trophies
            ctx.font = '60px Arial';
            ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
            ctx.fillText('🏆', 100, 150);
            ctx.fillText('🏆', canvas.width - 100, 150);
            ctx.fillText('🏆', 100, canvas.height - 150);
            ctx.fillText('🏆', canvas.width - 100, canvas.height - 150);

            // Flags
            ctx.font = '40px Arial';
            [300, 500, 700, 900, 1100, 1300, 1500, 1700, 1900].forEach(y => {
                if (Math.random() > 0.5) {
                    ctx.fillText('🇰🇷', 60, y);
                    ctx.fillText('🇰🇷', canvas.width - 90, y);
                }
            });

            updateStatus('✅ Frame Created!', 'Preparing upload...');
        }

        async function uploadFrame() {
            try {
                updateStatus('📤 Uploading...', 'Converting to PNG...');
                
                const canvas = document.getElementById('canvas');
                const dataUrl = canvas.toDataURL('image/png');
                const base64 = dataUrl.split(',')[1];

                updateStatus('📤 Uploading...', 'Sending to server...');

                const response = await fetch(`${API_URL}/api/upload-frame`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileData: base64,
                        fileName: 'team-korea-pnc2026.png',
                        mimeType: 'image/png',
                        photoSlots: [
                            { x: 8.33, y: 11.57, width: 83.33, height: 20.83, rotation: 0 },
                            { x: 8.33, y: 33.8, width: 83.33, height: 20.83, rotation: 0 },
                            { x: 8.33, y: 56.02, width: 83.33, height: 20.83, rotation: 0 },
                            { x: 8.33, y: 78.24, width: 83.33, height: 20.83, rotation: 0 }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`Upload failed: ${response.status}`);
                }

                const data = await response.json();
                const fileUrl = data?.file?.url || data?.file?.path;

                updateStatus('📝 Updating Frame...', 'Saving to database...');

                // Update frame with image
                const updateResponse = await fetch(`${API_URL}/api/frames/${FRAME_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        frameImage: fileUrl.startsWith('http') ? fileUrl : `${API_URL}${fileUrl}`
                    })
                });

                if (!updateResponse.ok) {
                    throw new Error('Failed to update frame');
                }

                updateStatus('🎉 SUCCESS!', '✅ Frame uploaded and ready to use!');
                document.getElementById('actions').style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 2000);

            } catch (error) {
                console.error('Upload error:', error);
                updateStatus('❌ Error', `Failed: ${error.message}`);
                document.getElementById('actions').style.display = 'block';
            }
        }

        function retry() {
            document.getElementById('actions').style.display = 'none';
            setTimeout(() => {
                drawFrame();
                setTimeout(uploadFrame, 1000);
            }, 500);
        }

        // Auto-start
        window.onload = () => {
            setTimeout(() => {
                drawFrame();
                setTimeout(uploadFrame, 1500);
            }, 1000);
        };
    </script>
</body>
</html>
