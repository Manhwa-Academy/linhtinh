
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Team Korea Final Frame</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        canvas {
            border: 3px solid #dc2626;
            border-radius: 10px;
            max-width: 400px;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🇰🇷 Team Korea - Final Frame</h1>
    <div class="status" id="status">Creating frame...</div>
    <canvas id="canvas" width="1080" height="2160"></canvas>

    <script>
        const API_URL = 'http://localhost:3001';
        const FRAME_ID = 'frame_1781880861870';
        
        const COLORS = {
            blue: '#0047A0',
            red: '#CD2E3A',
            white: '#FFFFFF',
            black: '#000000',
            gold: '#FFD700'
        };

        function createGradient(ctx, x0, y0, x1, y1, colors) {
            const gradient = ctx.createLinearGradient(x0, y0, x1, y1);
            colors.forEach((color, i) => {
                gradient.addColorStop(i / (colors.length - 1), color);
            });
            return gradient;
        }

        function drawFinalFrame() {
            document.getElementById('status').textContent = 'Drawing final frame...';
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // Clean white background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // === VERTICAL TEXT ON SIDES ===
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Left side - "RISE AGAIN" (vertical, gold)
            ctx.save();
            ctx.translate(50, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.font = 'bold 55px Arial';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 5;
            ctx.strokeText('RISE AGAIN', 0, 0);
            ctx.fillStyle = COLORS.gold;
            ctx.fillText('RISE AGAIN', 0, 0);
            ctx.restore();
            
            // Right side - "PNC 2026" (vertical, blue)
            ctx.save();
            ctx.translate(canvas.width - 50, canvas.height / 2);
            ctx.rotate(Math.PI / 2);
            ctx.font = 'bold 55px Arial';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 5;
            ctx.strokeText('PNC 2026', 0, 0);
            ctx.fillStyle = COLORS.blue;
            ctx.fillText('PNC 2026', 0, 0);
            ctx.restore();

            // === BLUE BORDER ONLY ===
            ctx.strokeStyle = COLORS.blue;
            ctx.lineWidth = 18;
            ctx.strokeRect(9, 9, canvas.width - 18, canvas.height - 18);

            // === HEADER ===
            const headerGrad = createGradient(ctx, 0, 0, canvas.width, 110,
                [COLORS.blue, COLORS.red, COLORS.blue]);
            ctx.fillStyle = headerGrad;
            ctx.fillRect(0, 0, canvas.width, 110);

            // Title "TEAM KOREA 🇰🇷"
            ctx.font = 'bold 75px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 7;
            ctx.strokeText('TEAM KOREA 🇰🇷', canvas.width / 2, 60);
            ctx.fillStyle = COLORS.white;
            ctx.fillText('TEAM KOREA 🇰🇷', canvas.width / 2, 60);

            // === PHOTO SLOTS - VERY LARGE ===
            const slots = [
                { y: 125, color: COLORS.blue },
                { y: 645, color: COLORS.red },
                { y: 1165, color: COLORS.blue },
                { y: 1685, color: COLORS.red }
            ];

            const slotWidth = 940;
            const slotHeight = 505;
            const startX = (canvas.width - slotWidth) / 2;

            slots.forEach((slot, index) => {
                // Thin border only
                ctx.strokeStyle = slot.color;
                ctx.lineWidth = 5;
                ctx.strokeRect(startX, slot.y, slotWidth, slotHeight);

                // Gold corner accents
                const cs = 20;
                ctx.fillStyle = COLORS.gold;
                // Top-left
                ctx.fillRect(startX - 2, slot.y - 2, cs, 2);
                ctx.fillRect(startX - 2, slot.y - 2, 2, cs);
                // Top-right
                ctx.fillRect(startX + slotWidth - cs + 2, slot.y - 2, cs, 2);
                ctx.fillRect(startX + slotWidth, slot.y - 2, 2, cs);
                // Bottom-left
                ctx.fillRect(startX - 2, slot.y + slotHeight, cs, 2);
                ctx.fillRect(startX - 2, slot.y + slotHeight - cs + 2, 2, cs);
                // Bottom-right
                ctx.fillRect(startX + slotWidth - cs + 2, slot.y + slotHeight, cs, 2);
                ctx.fillRect(startX + slotWidth, slot.y + slotHeight - cs + 2, 2, cs);
            });

            // Trophies in top corners
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🏆', 80, 60);
            ctx.fillText('🏆', canvas.width - 80, 60);

            document.getElementById('status').textContent = '✅ Frame ready! Uploading...';
            setTimeout(uploadFrame, 1000);
        }

        async function uploadFrame() {
            try {
                const canvas = document.getElementById('canvas');
                const dataUrl = canvas.toDataURL('image/png');
                const base64 = dataUrl.split(',')[1];

                document.getElementById('status').textContent = '📤 Uploading...';

                const response = await fetch(`${API_URL}/api/upload-frame`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileData: base64,
                        fileName: 'team-korea-final.png',
                        mimeType: 'image/png',
                        photoSlots: [
                            { x: 6.5, y: 5.8, width: 87, height: 23.4, rotation: 0 },
                            { x: 6.5, y: 29.9, width: 87, height: 23.4, rotation: 0 },
                            { x: 6.5, y: 53.9, width: 87, height: 23.4, rotation: 0 },
                            { x: 6.5, y: 78, width: 87, height: 23.4, rotation: 0 }
                        ]
                    })
                });

                if (!response.ok) throw new Error('Upload failed');
                const data = await response.json();
                const fileUrl = data?.file?.url || data?.file?.path;

                document.getElementById('status').textContent = '📝 Updating database...';

                const updateResponse = await fetch(`${API_URL}/api/frames/${FRAME_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        frameImage: fileUrl.startsWith('http') ? fileUrl : `${API_URL}${fileUrl}`,
                        photoSlots: [
                            { x: 6.5, y: 5.8, width: 87, height: 23.4, rotation: 0, label: "GYUMIN 🦝" },
                            { x: 6.5, y: 29.9, width: 87, height: 23.4, rotation: 0, label: "SEONGJANG 🔥" },
                            { x: 6.5, y: 53.9, width: 87, height: 23.4, rotation: 0, label: "HEAVEN 😇" },
                            { x: 6.5, y: 78, width: 87, height: 23.4, rotation: 0, label: "HEATHER ⭐" }
                        ]
                    })
                });

                if (!updateResponse.ok) throw new Error('Update failed');

                document.getElementById('status').innerHTML = '🎉 <strong>SUCCESS!</strong><br>Refresh BoothPage (Ctrl+Shift+R) to see new frame!';
                
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = `❌ Error: ${error.message}<br><button onclick="location.reload()">Retry</button>`;
            }
        }

        window.onload = () => {
            setTimeout(drawFinalFrame, 500);
        };
    </script>
</body>
</html>
