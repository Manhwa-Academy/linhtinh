<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Team Korea Frame</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        canvas {
            border: 3px solid #dc2626;
            border-radius: 10px;
            max-width: 400px;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🇰🇷 Simple Team Korea Frame</h1>
    <div class="status" id="status">Creating frame...</div>
    <canvas id="canvas" width="1080" height="2160"></canvas>

    <script>
        const API_URL = 'http://localhost:3001';
        const FRAME_ID = 'frame_1781880861870';
        
        const COLORS = {
            blue: '#0047A0',
            red: '#CD2E3A',
            white: '#FFFFFF',
            black: '#000000',
            gold: '#FFD700',
            darkBlue: '#003478'
        };

        function createGradient(ctx, x0, y0, x1, y1, colors) {
            const gradient = ctx.createLinearGradient(x0, y0, x1, y1);
            colors.forEach((color, i) => {
                gradient.addColorStop(i / (colors.length - 1), color);
            });
            return gradient;
        }

        function drawSimpleFrame() {
            document.getElementById('status').textContent = 'Drawing simple frame...';
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // Background - clean white
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // === TEXT ON SIDES (Vertical) ===
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Left side - "RISE AGAIN" (vertical, rotated)
            ctx.save();
            ctx.translate(40, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 4;
            ctx.strokeText('RISE AGAIN', 0, 0);
            ctx.fillStyle = COLORS.gold;
            ctx.fillText('RISE AGAIN', 0, 0);
            ctx.restore();
            
            // Right side - "PNC 2026" (vertical, rotated)
            ctx.save();
            ctx.translate(canvas.width - 40, canvas.height / 2);
            ctx.rotate(Math.PI / 2);
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 4;
            ctx.strokeText('PNC 2026', 0, 0);
            ctx.fillStyle = COLORS.blue;
            ctx.fillText('PNC 2026', 0, 0);
            ctx.restore();

            // === BORDERS ===
            // Outer blue border
            ctx.strokeStyle = COLORS.blue;
            ctx.lineWidth = 12;
            ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);

            // Inner red border
            ctx.strokeStyle = COLORS.red;
            ctx.lineWidth = 6;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

            // === HEADER - SIMPLE ===
            const headerGrad = createGradient(ctx, 0, 0, canvas.width, 100,
                [COLORS.blue, COLORS.red, COLORS.blue]);
            ctx.fillStyle = headerGrad;
            ctx.fillRect(0, 0, canvas.width, 100);

            // Title - NO "KR", just "TEAM KOREA 🇰🇷"
            ctx.font = 'bold 70px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 6;
            ctx.strokeText('TEAM KOREA 🇰🇷', canvas.width / 2, 55);
            ctx.fillStyle = COLORS.white;
            ctx.fillText('TEAM KOREA 🇰🇷', canvas.width / 2, 55);

            // === PHOTO SLOTS - MAXIMUM SIZE ===
            const slotData = [
                { y: 115, color: COLORS.blue },      // Slot 1
                { y: 655, color: COLORS.red },       // Slot 2  
                { y: 1195, color: '#9333ea' },       // Slot 3
                { y: 1735, color: COLORS.gold }      // Slot 4
            ];

            const slotWidth = 980;   // Wide
            const slotHeight = 525;  // Tall!
            const startX = (canvas.width - slotWidth) / 2;

            slotData.forEach((slot, index) => {
                // Just border - clean and simple
                ctx.strokeStyle = slot.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(startX, slot.y, slotWidth, slotHeight);

                // Small corner gold accents
                const cs = 18;
                ctx.fillStyle = COLORS.gold;
                // Top corners
                ctx.fillRect(startX - 2, slot.y - 2, cs, 2);
                ctx.fillRect(startX - 2, slot.y - 2, 2, cs);
                ctx.fillRect(startX + slotWidth - cs + 2, slot.y - 2, cs, 2);
                ctx.fillRect(startX + slotWidth, slot.y - 2, 2, cs);
                // Bottom corners
                ctx.fillRect(startX - 2, slot.y + slotHeight, cs, 2);
                ctx.fillRect(startX - 2, slot.y + slotHeight - cs + 2, 2, cs);
                ctx.fillRect(startX + slotWidth - cs + 2, slot.y + slotHeight, cs, 2);
                ctx.fillRect(startX + slotWidth, slot.y + slotHeight - cs + 2, 2, cs);
            });

            // NO FOOTER - slots go to bottom!

            // Trophies in corners
            ctx.font = '50px Arial';
            ctx.fillText('🏆', 70, 55);
            ctx.fillText('🏆', canvas.width - 70, 55);

            document.getElementById('status').textContent = '✅ Frame ready! Uploading...';
            setTimeout(uploadFrame, 1000);
        }

        async function uploadFrame() {
            try {
                const canvas = document.getElementById('canvas');
                const dataUrl = canvas.toDataURL('image/png');
                const base64 = dataUrl.split(',')[1];

                document.getElementById('status').textContent = '📤 Uploading to server...';

                const response = await fetch(`${API_URL}/api/upload-frame`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileData: base64,
                        fileName: 'team-korea-simple.png',
                        mimeType: 'image/png',
                        photoSlots: [
                            { x: 4.6, y: 5.3, width: 90.7, height: 24.3, rotation: 0 },
                            { x: 4.6, y: 30.3, width: 90.7, height: 24.3, rotation: 0 },
                            { x: 4.6, y: 55.3, width: 90.7, height: 24.3, rotation: 0 },
                            { x: 4.6, y: 80.3, width: 90.7, height: 24.3, rotation: 0 }
                        ]
                    })
                });

                if (!response.ok) throw new Error('Upload failed');
                const data = await response.json();
                const fileUrl = data?.file?.url || data?.file?.path;

                document.getElementById('status').textContent = '📝 Updating frame...';

                const updateResponse = await fetch(`${API_URL}/api/frames/${FRAME_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        frameImage: fileUrl.startsWith('http') ? fileUrl : `${API_URL}${fileUrl}`,
                        photoSlots: [
                        photoSlots: [
                            { x: 4.6, y: 5.3, width: 90.7, height: 24.3, rotation: 0, label: "GYUMIN 🦝" },
                            { x: 4.6, y: 30.3, width: 90.7, height: 24.3, rotation: 0, label: "SEONGJANG 🔥" },
                            { x: 4.6, y: 55.3, width: 90.7, height: 24.3, rotation: 0, label: "HEAVEN 😇" },
                            { x: 4.6, y: 80.3, width: 90.7, height: 24.3, rotation: 0, label: "HEATHER ⭐" }
                        ]
                        ]
                    })
                });

                if (!updateResponse.ok) throw new Error('Failed to update');

                document.getElementById('status').innerHTML = '🎉 <strong>SUCCESS!</strong><br>Refresh BoothPage to see the new frame!';
                
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = `❌ Error: ${error.message}<br><button onclick="location.reload()">Retry</button>`;
            }
        }

        window.onload = () => {
            setTimeout(drawSimpleFrame, 500);
        };
    </script>
</body>
</html>
