<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload DNS to Production</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            max-width: 600px;
        }
        canvas {
            border: 3px solid #00a8ff;
            border-radius: 10px;
            max-width: 400px;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🎮 Upload DNS PUBG 2026 to Production</h1>
    <div class="status" id="status">Creating frame...</div>
    <canvas id="canvas" width="1080" height="2160"></canvas>

    <script>
        const API_URL = 'https://meomiry-backend.vercel.app'; // Production backend
        const FRAME_ID = 'frame_dns_pubg_2026_prod';
        
        const COLORS = {
            blue: '#00a8ff',
            darkBlue: '#0066cc',
            lightBlue: '#4fc3f7',
            white: '#FFFFFF',
            black: '#000000',
            gray: '#333333',
            mapGreen: '#7CB342',
            mapBrown: '#8D6E63'
        };

        const PLAYERS = [
            { name: 'GYUMIN', emoji: '🦝' },
            { name: 'HEAVEN', emoji: '😇' },
            { name: 'DIEL', emoji: '🐶' },
            { name: 'REX', emoji: '🦖' }
        ];

        function createGradient(ctx, x0, y0, x1, y1, colors) {
            const gradient = ctx.createLinearGradient(x0, y0, x1, y1);
            colors.forEach((color, i) => {
                gradient.addColorStop(i / (colors.length - 1), color);
            });
            return gradient;
        }

        function drawErangelPattern(ctx, width, height) {
            ctx.save();
            ctx.globalAlpha = 0.08;
            
            ctx.strokeStyle = COLORS.darkBlue;
            ctx.lineWidth = 2;
            for (let i = 0; i < width; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, height);
                ctx.stroke();
            }
            for (let i = 0; i < height; i += 100) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }
            
            ctx.strokeStyle = COLORS.blue;
            ctx.lineWidth = 8;
            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                const x1 = Math.random() * width;
                const y1 = Math.random() * height;
                const x2 = Math.random() * width;
                const y2 = Math.random() * height;
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function drawDNSFrame() {
            document.getElementById('status').textContent = 'Drawing DNS frame...';
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const bgGrad = createGradient(ctx, 0, 0, 0, canvas.height,
                [COLORS.white, COLORS.lightBlue, COLORS.white, COLORS.lightBlue, COLORS.white]);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawErangelPattern(ctx, canvas.width, canvas.height);

            ctx.strokeStyle = COLORS.blue;
            ctx.lineWidth = 18;
            ctx.strokeRect(9, 9, canvas.width - 18, canvas.height - 18);

            const headerGrad = createGradient(ctx, 0, 0, canvas.width, 120,
                [COLORS.darkBlue, COLORS.blue, COLORS.darkBlue]);
            ctx.fillStyle = headerGrad;
            ctx.fillRect(0, 0, canvas.width, 120);

            ctx.font = 'bold 70px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = COLORS.black;
            ctx.lineWidth = 9;
            ctx.strokeText('DNS PUBG 2026', canvas.width / 2, 65);
            ctx.fillStyle = COLORS.white;
            ctx.fillText('DNS PUBG 2026', canvas.width / 2, 65);

            ctx.font = '50px Arial';
            ctx.fillText('🎮', 70, 65);
            ctx.fillText('🔫', canvas.width - 70, 65);

            const slotWidth = 860;
            const slotHeight = 490;
            const startX = (canvas.width - slotWidth) / 2;
            const startY = 140;
            const gap = 15;

            PLAYERS.forEach((player, index) => {
                const y = startY + index * (slotHeight + gap);
                
                ctx.strokeStyle = index % 2 === 0 ? COLORS.blue : COLORS.darkBlue;
                ctx.lineWidth = 6;
                ctx.strokeRect(startX, y, slotWidth, slotHeight);

                const emojiX = startX - 55;
                const emojiY = y + slotHeight / 2;
                
                ctx.save();
                ctx.translate(emojiX, emojiY);
                ctx.rotate(-Math.PI / 2);
                
                ctx.fillStyle = COLORS.darkBlue;
                ctx.fillRect(-50, -50, 100, 100);
                
                ctx.font = '70px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(player.emoji, 0, 0);
                ctx.restore();

                const labelX = startX + slotWidth + 55;
                const labelY = y + slotHeight / 2;
                
                ctx.save();
                ctx.translate(labelX, labelY);
                ctx.rotate(Math.PI / 2);
                
                ctx.fillStyle = COLORS.darkBlue;
                ctx.fillRect(-120, -40, 240, 80);
                
                ctx.strokeStyle = COLORS.blue;
                ctx.lineWidth = 4;
                ctx.strokeRect(-120, -40, 240, 80);
                
                ctx.font = 'bold 62px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeStyle = COLORS.black;
                ctx.lineWidth = 8;
                ctx.strokeText(player.name, 0, 0);
                ctx.fillStyle = COLORS.white;
                ctx.fillText(player.name, 0, 0);
                
                ctx.restore();

                const cs = 25;
                ctx.fillStyle = COLORS.white;
                ctx.fillRect(startX - 2, y - 2, cs, 3);
                ctx.fillRect(startX - 2, y - 2, 3, cs);
                ctx.fillRect(startX + slotWidth - cs + 2, y - 2, cs, 3);
                ctx.fillRect(startX + slotWidth, y - 2, 3, cs);
                ctx.fillRect(startX - 2, y + slotHeight - 1, cs, 3);
                ctx.fillRect(startX - 2, y + slotHeight - cs + 2, 3, cs);
                ctx.fillRect(startX + slotWidth - cs + 2, y + slotHeight - 1, cs, 3);
                ctx.fillRect(startX + slotWidth, y + slotHeight - cs + 2, 3, cs);
            });

            document.getElementById('status').textContent = '✅ Frame ready! Uploading to PRODUCTION...';
            setTimeout(uploadFrame, 1000);
        }

        async function uploadFrame() {
            try {
                const canvas = document.getElementById('canvas');
                const dataUrl = canvas.toDataURL('image/png');
                const base64 = dataUrl.split(',')[1];

                document.getElementById('status').textContent = '📤 Uploading to PRODUCTION backend...';

                const response = await fetch(`${API_URL}/api/upload-frame`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileData: base64,
                        fileName: 'dns-pubg-2026-prod.png',
                        mimeType: 'image/png',
                        photoSlots: [
                            { x: 10, y: 6.5, width: 79.6, height: 22.7, rotation: 0 },
                            { x: 10, y: 30, width: 79.6, height: 22.7, rotation: 0 },
                            { x: 10, y: 53.5, width: 79.6, height: 22.7, rotation: 0 },
                            { x: 10, y: 77, width: 79.6, height: 22.7, rotation: 0 }
                        ]
                    })
                });

                if (!response.ok) throw new Error('Upload failed: ' + response.status);
                const data = await response.json();
                const fileUrl = data?.file?.url || data?.file?.path;

                document.getElementById('status').textContent = '📝 Adding to PRODUCTION database...';

                const createResponse = await fetch(`${API_URL}/api/frames`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: FRAME_ID,
                        name: 'DNS PUBG 2026',
                        emoji: '🎮',
                        description: 'PUBG 2026 - Erangel Theme: GYUMIN 🦝, HEAVEN 😇, DIEL 🐶, REX 🦖',
                        color: '#E3F2FD',
                        bgGradient: 'linear-gradient(135deg, #FFFFFF 0%, #E3F2FD 50%, #FFFFFF 100%)',
                        frameImage: fileUrl.startsWith('http') ? fileUrl : `${API_URL}${fileUrl}`,
                        photoSlots: [
                            { x: 10, y: 6.5, width: 79.6, height: 22.7, rotation: 0, label: "GYUMIN 🦝" },
                            { x: 10, y: 30, width: 79.6, height: 22.7, rotation: 0, label: "HEAVEN 😇" },
                            { x: 10, y: 53.5, width: 79.6, height: 22.7, rotation: 0, label: "DIEL 🐶" },
                            { x: 10, y: 77, width: 79.6, height: 22.7, rotation: 0, label: "REX 🦖" }
                        ]
                    })
                });

                if (!createResponse.ok) {
                    const errorText = await createResponse.text();
                    throw new Error('Create failed: ' + errorText);
                }

                document.getElementById('status').innerHTML = '🎉 <strong>SUCCESS!</strong><br>DNS PUBG 2026 uploaded to PRODUCTION!<br>Go to https://meomiry.vercel.app/admin and refresh!';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = `❌ Error: ${error.message}<br><button onclick="location.reload()">Retry</button>`;
            }
        }

        window.onload = () => {
            setTimeout(drawDNSFrame, 500);
        };
    </script>
</body>
</html>
