<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients - Sky blue theme -->
    <linearGradient id="skyBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7DD3FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Subtle texture pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    </pattern>
    
    <!-- Mask to cut holes for photo slots -->
    <mask id="frameMask">
      <!-- White = visible, Black = transparent -->
      <rect width="1080" height="2160" fill="white"/>
      <!-- Cut holes for photo slots (black rectangles) -->
      <rect x="108" y="152" width="864" height="460" fill="black" rx="8"/>
      <rect x="108" y="644" width="864" height="460" fill="black" rx="8"/>
      <rect x="108" y="1120" width="864" height="460" fill="black" rx="8"/>
      <rect x="108" y="1600" width="864" height="460" fill="black" rx="8"/>
    </mask>
  </defs>

  <!-- Main Background with gradient and mask -->
  <rect width="1080" height="2160" fill="url(#skyBlueGrad)" mask="url(#frameMask)"/>
  <rect width="1080" height="2160" fill="url(#grid)" mask="url(#frameMask)"/>

  <!-- Top Header Section -->
  <rect x="0" y="0" width="1080" height="100" fill="url(#headerGrad)" opacity="0.95"/>
  
  <!-- DNS PUBG Text -->
  <text x="540" y="50" font-family="'Impact', 'Arial Black', sans-serif" font-size="52" font-weight="900" 
        fill="white" text-anchor="middle" stroke="#000000" stroke-width="4" letter-spacing="6">DNS PUBG</text>
  
  <!-- 2026 Subtitle -->
  <text x="540" y="85" font-family="'Arial', sans-serif" font-size="22" font-weight="bold" 
        fill="#FFD700" text-anchor="middle" stroke="#000000" stroke-width="2" letter-spacing="2">2026</text>

  <!-- Decorative stars top -->
  <text x="80" y="65" font-size="42">⭐</text>
  <text x="1000" y="65" font-size="42">⭐</text>

  <!-- Photo Slot 1: GYUMIN -->
  <g id="slot1">
    <!-- Player name (left, OUTSIDE photo area) -->
    <text x="30" y="135" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" 
          fill="#FFD700" stroke="#000000" stroke-width="3" letter-spacing="1">GYUMIN</text>
    
    <!-- Star decoration -->
    <text x="1000" y="140" font-size="40">⭐</text>
    
    <!-- Slot border frame (transparent for photo) -->
    <rect x="108" y="152" width="864" height="460" fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="152" width="864" height="460" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" rx="8"/>
  </g>

  <!-- Photo Slot 2: HEAVEN -->
  <g id="slot2">
    <rect x="108" y="644" width="864" height="460" fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="644" width="864" height="460" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left, OUTSIDE photo area) -->
    <text x="30" y="627" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" 
          fill="#FFD700" stroke="#000000" stroke-width="3" letter-spacing="1">HEAVEN</text>
    
    <!-- Star decoration -->
    <text x="1000" y="632" font-size="40">⭐</text>
  </g>

  <!-- Photo Slot 3: DIEL -->
  <g id="slot3">
    <rect x="108" y="1120" width="864" height="460" fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="1120" width="864" height="460" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left, OUTSIDE photo area) -->
    <text x="30" y="1103" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" 
          fill="#FFD700" stroke="#000000" stroke-width="3" letter-spacing="1">DIEL</text>
    
    <!-- Star decoration -->
    <text x="1000" y="1108" font-size="40">⭐</text>
  </g>

  <!-- Photo Slot 4: REX -->
  <g id="slot4">
    <rect x="108" y="1600" width="864" height="460" fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="1600" width="864" height="460" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left, OUTSIDE photo area) -->
    <text x="30" y="1583" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" 
          fill="#FFD700" stroke="#000000" stroke-width="3" letter-spacing="1">REX</text>
    
    <!-- Star decoration -->
    <text x="1000" y="1588" font-size="40">⭐</text>
  </g>

  <!-- Bottom Footer Section -->
  <rect x="0" y="2060" width="1080" height="100" fill="url(#footerGrad)" opacity="0.95"/>
  
  <!-- Footer decorations -->
  <text x="150" y="2120" font-size="48">🏆</text>
  <text x="880" y="2120" font-size="48">⭐</text>
  
  <!-- WWCD text -->
  <text x="540" y="2125" font-family="'Impact', 'Arial Black', sans-serif" font-size="60" font-weight="900" 
        fill="#FFD700" text-anchor="middle" stroke="#000000" stroke-width="4" letter-spacing="10">WWCD</text>

  <!-- Corner decorations - targeting reticle style -->
  <g opacity="0.5">
    <!-- Top-left corners -->
    <line x1="30" y1="120" x2="80" y2="120" stroke="#7DD3FC" stroke-width="3"/>
    <line x1="30" y1="120" x2="30" y2="170" stroke="#7DD3FC" stroke-width="3"/>
    
    <!-- Top-right corners -->
    <line x1="1000" y1="120" x2="1050" y2="120" stroke="#7DD3FC" stroke-width="3"/>
    <line x1="1050" y1="120" x2="1050" y2="170" stroke="#7DD3FC" stroke-width="3"/>
    
    <!-- Bottom-left corners -->
    <line x1="30" y1="2040" x2="80" y2="2040" stroke="#7DD3FC" stroke-width="3"/>
    <line x1="30" y1="1990" x2="30" y2="2040" stroke="#7DD3FC" stroke-width="3"/>
    
    <!-- Bottom-right corners -->
    <line x1="1000" y1="2040" x2="1050" y2="2040" stroke="#7DD3FC" stroke-width="3"/>
    <line x1="1050" y1="1990" x2="1050" y2="2040" stroke="#7DD3FC" stroke-width="3"/>
  </g>

  <!-- Crosshair center decorations between slots -->
  <g opacity="0.3">
    <circle cx="540" cy="450" r="8" fill="none" stroke="white" stroke-width="2"/>
    <line x1="520" y1="450" x2="560" y2="450" stroke="white" stroke-width="2"/>
    <line x1="540" y1="430" x2="540" y2="470" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Star decorations -->
  <text x="100" y="1000" font-size="36" opacity="0.3">⭐</text>
  <text x="980" y="1400" font-size="36" opacity="0.3">⭐</text>
</svg>
