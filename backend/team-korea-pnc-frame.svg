<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Korean flag colors gradient -->
    <linearGradient id="koreanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#E8F0FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0047A0;stop-opacity:0.2" />
      <stop offset="75%" style="stop-color:#FFE8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0047A0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CD2E3A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CD2E3A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047A0;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0047A0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#CD2E3A;stop-opacity:0.9" />
    </linearGradient>

    <!-- Mask to cut transparent holes for photos -->
    <mask id="frameMask">
      <rect width="1080" height="2160" fill="white"/>
      <!-- Cut transparent holes for 4 photo slots -->
      <rect x="108" y="152" width="864" height="460" fill="black" rx="8"/>
      <rect x="108" y="644" width="864" height="460" fill="black" rx="8"/>
      <rect x="108" y="1120" width="864" height="460" fill="black" rx="8"/>
      <rect x="108" y="1600" width="864" height="460" fill="black" rx="8"/>
    </mask>
  </defs>

  <!-- Background with mask -->
  <rect width="1080" height="2160" fill="url(#koreanGrad)" mask="url(#frameMask)"/>
  
  <!-- Blue and Red borders -->
  <rect x="10" y="10" width="1060" height="2140" 
        fill="none" stroke="#0047A0" stroke-width="12"/>
  <rect x="22" y="22" width="1036" height="2116" 
        fill="none" stroke="#CD2E3A" stroke-width="6"/>

  <!-- Header Section -->
  <rect width="1080" height="100" fill="url(#headerGrad)" opacity="0.95"/>
  
  <!-- Main Title TEAM KOREA -->
  <text x="540" y="50" font-family="'Impact', 'Arial Black', sans-serif" 
        font-size="52" font-weight="900" text-anchor="middle" 
        fill="#0047A0" stroke="#FFFFFF" stroke-width="4" letter-spacing="6">⭐ TEAM KOREA ⭐</text>
  
  <!-- Subtitle PNC 2026 -->
  <text x="540" y="85" font-family="'Arial', sans-serif" 
        font-size="24" font-weight="bold" text-anchor="middle" 
        fill="#CD2E3A" stroke="#FFFFFF" stroke-width="2" letter-spacing="3">PNC 2026</text>

  <!-- Trophy Left -->
  <text x="100" y="70" font-size="48">🏆</text>
  
  <!-- Trophy Right -->
  <text x="980" y="70" font-size="48">🏆</text>

  <!-- Photo Slot 1: GYUMIN -->
  <g id="slot1">
    <rect x="108" y="152" width="864" height="460" 
          fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="152" width="864" height="460" 
          fill="none" stroke="rgba(0,71,160,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left side) -->
    <text x="30" y="137" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#0047A0" stroke="#FFFFFF" stroke-width="3" letter-spacing="1">GYUMIN</text>
    
    <!-- KR text -->
    <text x="990" y="140" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#CD2E3A" stroke="#FFFFFF" stroke-width="2">KR</text>
  </g>

  <!-- Photo Slot 2: SEONGJANG -->
  <g id="slot2">
    <rect x="108" y="644" width="864" height="460" 
          fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="644" width="864" height="460" 
          fill="none" stroke="rgba(0,71,160,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left side) -->
    <text x="30" y="629" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#0047A0" stroke="#FFFFFF" stroke-width="3" letter-spacing="1">SEONGJANG</text>
    
    <!-- KR text -->
    <text x="990" y="632" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#CD2E3A" stroke="#FFFFFF" stroke-width="2">KR</text>
  </g>

  <!-- Photo Slot 3: HEAVEN -->
  <g id="slot3">
    <rect x="108" y="1120" width="864" height="460" 
          fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="1120" width="864" height="460" 
          fill="none" stroke="rgba(0,71,160,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left side) -->
    <text x="30" y="1105" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#0047A0" stroke="#FFFFFF" stroke-width="3" letter-spacing="1">HEAVEN</text>
    
    <!-- KR text -->
    <text x="990" y="1108" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#CD2E3A" stroke="#FFFFFF" stroke-width="2">KR</text>
  </g>

  <!-- Photo Slot 4: HEATHER -->
  <g id="slot4">
    <rect x="108" y="1600" width="864" height="460" 
          fill="none" stroke="url(#borderGrad)" stroke-width="6" rx="8"/>
    <rect x="108" y="1600" width="864" height="460" 
          fill="none" stroke="rgba(0,71,160,0.3)" stroke-width="2" rx="8"/>
    
    <!-- Player name (left side) -->
    <text x="30" y="1585" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#0047A0" stroke="#FFFFFF" stroke-width="3" letter-spacing="1">HEATHER</text>
    
    <!-- KR text -->
    <text x="990" y="1588" font-family="'Arial Black', sans-serif" 
          font-size="32" font-weight="900" 
          fill="#CD2E3A" stroke="#FFFFFF" stroke-width="2">KR</text>
  </g>

  <!-- Decorative Korean flags -->
  <text x="50" y="1000" font-size="48" opacity="0.5">🇰🇷</text>
  <text x="980" y="1400" font-size="48" opacity="0.5">🇰🇷</text>

  <!-- Footer Section -->
  <rect y="2060" width="1080" height="100" fill="url(#footerGrad)" opacity="0.95"/>
  
  <!-- Trophy Left Footer -->
  <text x="200" y="2115" font-size="48">🏆</text>
  
  <!-- KR flag right footer -->
  <text x="880" y="2120" font-size="42">🇰🇷</text>
  
  <!-- RISE AGAIN text -->
  <text x="540" y="2120" font-family="'Impact', 'Arial Black', sans-serif" 
        font-size="56" font-weight="900" text-anchor="middle" 
        fill="#0047A0" stroke="#FFFFFF" stroke-width="3" letter-spacing="8">RISE AGAIN</text>

  <!-- Corner decorations - targeting reticle style -->
  <g opacity="0.5">
    <!-- Top-left corners -->
    <line x1="30" y1="120" x2="80" y2="120" stroke="#0047A0" stroke-width="3"/>
    <line x1="30" y1="120" x2="30" y2="170" stroke="#0047A0" stroke-width="3"/>
    
    <!-- Top-right corners -->
    <line x1="1000" y1="120" x2="1050" y2="120" stroke="#CD2E3A" stroke-width="3"/>
    <line x1="1050" y1="120" x2="1050" y2="170" stroke="#CD2E3A" stroke-width="3"/>
    
    <!-- Bottom-left corners -->
    <line x1="30" y1="2040" x2="80" y2="2040" stroke="#CD2E3A" stroke-width="3"/>
    <line x1="30" y1="1990" x2="30" y2="2040" stroke="#CD2E3A" stroke-width="3"/>
    
    <!-- Bottom-right corners -->
    <line x1="1000" y1="2040" x2="1050" y2="2040" stroke="#0047A0" stroke-width="3"/>
    <line x1="1050" y1="1990" x2="1050" y2="2040" stroke="#0047A0" stroke-width="3"/>
  </g>

  <!-- Star pattern decoration -->
  <g opacity="0.3">
    <text x="540" y="330" font-size="28" fill="#0047A0">⭐</text>
    <text x="540" y="820" font-size="28" fill="#CD2E3A">⭐</text>
    <text x="540" y="1300" font-size="28" fill="#0047A0">⭐</text>
    <text x="540" y="1780" font-size="28" fill="#CD2E3A">⭐</text>
  </g>
</svg>
